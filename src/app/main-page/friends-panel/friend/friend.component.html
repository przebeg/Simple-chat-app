<div id="friend">
    <div id="profile-image" [style.background-image]="'url(assets/profile-image-placeholder.png)'"></div>
    <div id="labels">
        <span id="name" class="medium-text">Jakub Zwyrolowicz</span>
        <span id="last-active" class="small-text">Last active 5m ago</span>
    </div>
    <div id="buttons">
        <div class="button" id="remove-friend">
            <div class="button-icon"></div>
        </div>
        <div class="button" id="send-message">
            <div class="button-icon"></div>
        </div>
    </div>
</div>
