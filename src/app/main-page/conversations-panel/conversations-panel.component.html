<div id="conversations-panel-wrapper">
    <input [formControl]="searchFormControl" class="global-text-input" type="text" placeholder="Search for conversation">
    <div id="conversations-wrapper" [class.placeholder]="isPlaceholder" [class]="placeholderClass"></div>
    @if(searchInProgress){
        @for(n of loadingPlaceholdersCount; track n){
            <friend-conversation-loading-placeholder></friend-conversation-loading-placeholder>
        }
    }
    @else {
      @for(conversation of conversations; track conversation){
        <div class="user-element conversation-element">
            <div class="profile-image" [style.background-image]="conversation.conversationImageQuery"></div>
            <div class="labels">
                <span class="name medium-text">{{conversation.conversationName}}</span>
                <span class="message small-text conversation-last-message">{{conversation.lastMessage}}</span>
            </div>
        </div>
      }
    }
</div>
