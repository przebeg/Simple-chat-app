<div id="options-bar" class="main-wrapper">
    <img src="assets/options-bar-logo.png" id="logo-img" alt="Anglar Placeholder Logo">
    <div id="options-bar-icons-wrapper">
        <a [routerLink]="'/conversations'">
            <div class="option-icon">
                <img src="assets/options-bar-icons/chat-icon.png" alt="Chats Icon">
                <span class="option-icon-indicator" [class.hidden]="friendsRequestsIndicatorValue === 0">{{friendsRequestsIndicatorValue}}</span>
                <span>Chats</span>
            </div>
        </a>
        <a [routerLink]="'/friends'">
            <div class="option-icon">
                <img src="assets/options-bar-icons/friends.png" alt="Friends Icon">
                <span class="option-icon-indicator" [class.hidden]="friendsRequestsIndicatorValue === 0">{{friendsRequestsIndicatorValue}}</span>
                <span>Friends</span>
        </div></a>
        <a [routerLink]="'/search'"><div class="option-icon">
            <img src="assets/options-bar-icons/search.svg" alt="Search Icon">
            <span>Search</span>
            </div>
        </a>
    </div>
    <div id="profile-info-wrapper">
        <profile-info-component />
    </div>
</div>
<div id="left-panel-wrapper" class="main-wrapper">
    <div id="left-panel-router-label-container">
        <h2 class="big-text text-left">{{leftPanelTitle}}</h2>
    </div>
    <div id="left-panel-router-wrapper">
        <router-outlet></router-outlet>
    </div>
</div>
<div id="main-panel-wrapper" class="main-wrapper">
    <chat-panel></chat-panel>
</div>
