<div id="chat-panel-wrapper">
    <div id="top-panel">
        <div class="user-element active-now">
            <div class="profile-image" [style.background-image]="'url(' + '/assets/profile-image-placeholder.png' + ')'"></div>
            <div class="labels">
                <span class="name medium-text">Andrzej</span>
                <span class="message small-text">Active Now</span>
            </div>
        </div>
    </div>
    <div class="global-horizontal-divider"></div>
    <div id="chats-container">
        <div class="message">
            <div class="user-element">
                <div class="profile-image" [style.background-image]="'url(' + '/assets/profile-image-placeholder.png' + ')'"></div>
            </div>
            <span class="message-content small-text text-left">Ja pierdole XDDDD</span>
        </div>
        <div class="message" style="justify-content: flex-end;">
            <span class="message-content small-text text-left">Ja pierdole XDDDD</span>
        </div>
    </div>
    <div id="message-input-bar">
        <textarea type="text" placeholder="Send message to andrzej" class="global-text-input"></textarea>
        <div id="message-input-buttons-wrapper">
            <div class="small-button"></div>
        </div>
    </div>
</div>
